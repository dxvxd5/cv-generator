version: 0.1
cli:
  version: 1.25.0
lint:
  enabled:
    - actionlint@1.7.12
    - bandit@1.9.4
    - checkov@3.2.525
    - git-diff-check
    - osv-scanner@2.3.5
    - prettier@3.8.3
    - ruff@0.15.12
    - taplo@0.10.0
    - trufflehog@3.95.2
    - yamllint@1.38.0
    - black@26.3.1
    - flake8@7.3.0
    - gitleaks@8.30.1
    - isort@8.0.1
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
runtimes:
  enabled:
    - node@22.16.0
    - go@1.21.0
    - python@3.10.8
